      <stop stop-color="#0b0f0d"/>
      <stop offset="1" stop-color="#121a15"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#83f28f" stop-opacity="0.14"/>
      <stop offset="0.46" stop-color="#83f28f"/>
      <stop offset="1" stop-color="#d7ff6f" stop-opacity="0.2"/>
