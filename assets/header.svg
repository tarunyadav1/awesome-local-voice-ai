  <circle cx="602" cy="180" r="5" fill="#d7ff6f"/>
  <text x="70" y="88" fill="#83f28f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="3">OPEN FIELD GUIDE / 2026</text>
  <text x="70" y="294" fill="#f2f7f3" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="680" letter-spacing="-2">Awesome Local Voice AI</text>
